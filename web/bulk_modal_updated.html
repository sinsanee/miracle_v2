    <!-- Bulk Add Cards Modal - UPDATED WITH PREVIEW AND PER-CARD CROP -->
    <div id="bulk-modal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <button class="close-modal" onclick="closeModal('bulk-modal')">&times;</button>
            <h3 class="modal-header">Bulk Add Cards</h3>
            <form id="bulk-form" onsubmit="handleBulkSubmit(event)">
                <div class="form-group">
                    <label>Set (Applied to all cards)</label>
                    <div class="radio-option">
                        <input type="radio" id="bulk-set-existing" name="bulk-set-type" value="existing" checked onchange="toggleBulkSet()">
                        <label for="bulk-set-existing">Use Existing Set</label>
                    </div>
                    <select id="bulk-set-select" name="set_id">
                        <% if (sets.length === 0) { %>
                            <option value="">No sets available - create one below</option>
                        <% } else { %>
                            <% sets.forEach(set => { %>
                                <option value="<%= set.id %>"><%= set.name %></option>
                            <% }); %>
                        <% } %>
                    </select>
                    
                    <div class="radio-option" style="margin-top: 10px;">
                        <input type="radio" id="bulk-set-new" name="bulk-set-type" value="new" onchange="toggleBulkSet()">
                        <label for="bulk-set-new">Create New Set</label>
                    </div>
                    <input type="text" id="bulk-set-name-input" name="set_name" placeholder="New set name" style="display: none; margin-top: 10px;">
                </div>

                <div class="form-group">
                    <label>Dropping Status (Applied to all)</label>
                    <div class="radio-option">
                        <input type="radio" id="bulk-dropping-yes" name="bulk-dropping" value="1" checked>
                        <label for="bulk-dropping-yes">Yes - Drop immediately</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="bulk-dropping-no" name="bulk-dropping" value="0">
                        <label for="bulk-dropping-no">No - Don't drop yet</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Cards to Add</label>
                    <div id="bulk-cards-container"></div>
                    <button type="button" class="btn btn-small" onclick="addBulkCardRow()">+ Add Another Card</button>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn" onclick="closeModal('bulk-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="generateBulkPreviews()">Preview All Cards</button>
                    <button type="submit" class="btn btn-primary">Create All Cards</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bulk Preview Modal - NEW -->
    <div id="bulk-preview-modal" class="modal">
        <div class="modal-content" style="max-width: 1200px;">
            <button class="close-modal" onclick="closeModal('bulk-preview-modal')">&times;</button>
            <h3 class="modal-header">Preview Bulk Cards</h3>
            
            <div id="bulk-preview-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin: 20px 0;">
                <!-- Previews will be inserted here -->
            </div>
            
            <div class="form-actions">
                <button type="button" class="btn" onclick="closeModal('bulk-preview-modal')">Back to Edit</button>
                <button type="button" class="btn btn-primary" onclick="confirmBulkFromPreview()">Confirm & Create All</button>
            </div>
        </div>
    </div>
